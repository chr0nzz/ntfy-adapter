<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTFY Notifications</title>
    <style>
        /* =========================================
           USER CUSTOMIZATION: COLORS & THEMES
           =========================================
        */
        :root {
            /* Theme setting: change 'dark' to 'light' here and on line 180 */
            --theme: 'dark';

            --success: #22c55e;
            --danger: #ef4444;
            --accent: #3b82f6;
        }

        /* DARK THEME */
        [data-theme="dark"] {
            --bg-color: #000000;
            --card-bg: #111111;
            --border-color: #222222;
            --text-main: #ffffff;
            --text-muted: #888888;
            --header-gradient: linear-gradient(to bottom, #111111, #000000);
        }

        /* LIGHT THEME */
        [data-theme="light"] {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --header-gradient: linear-gradient(to bottom, #ffffff, #f1f5f9);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        header {
            background: var(--header-gradient);
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        #clock-container {
            text-align: right;
        }

        #clock {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1;
        }

        #date {
            font-size: 1.2rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 0.2rem;
        }

        main {
            flex: 1;
            padding: 2rem 3rem;
            overflow-y: auto;
            scrollbar-width: none;
        }

        main::-webkit-scrollbar { display: none; }

        .notification-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            padding-bottom: 10rem;
        }

        .notification {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            display: flex;
            gap: 2rem;
            align-items: flex-start;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            border-left: 12px solid var(--accent);
            animation: fadeIn 0.6s ease-out forwards;
        }

        .notification.priority-max { border-left-color: var(--danger); }
        .notification.priority-high { border-left-color: var(--accent); }
        .notification.priority-standard { border-left-color: var(--success); }

        .message-content {
            flex: 1;
        }

        .message-text {
            font-size: 2.2rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 0.5rem;
            white-space: pre-wrap;
        }

        .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .time-badge {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-muted);
            background: rgba(128,128,128,0.1);
            padding: 0.4rem 1rem;
            border-radius: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #status-indicator {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .error-overlay {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: var(--danger);
            color: white;
            text-align: center;
            padding: 0.5rem;
            font-weight: bold;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body data-theme="dark"> <!-- Change to "light" here for light mode -->

    <div id="error-overlay" class="error-overlay">CONNECTION ERROR: Check ntfy-adapter logs</div>

    <header>
        <h1>⁉️ <span>Topic Feed</span></h1> <!-- Change topic and Emoji-->
        <div id="clock-container">
            <div id="clock">00:00:00</div>
            <div id="date">Tuesday, March 3</div>
        </div>
    </header>

    <main id="scroll-container">
        <div id="notifications-wrapper" class="notification-list">
        </div>
    </main>

    <div id="status-indicator">Updating in <span id="timer">--</span>s</div>

    <script>
        /* =========================================
           USER CUSTOMIZATION: API SETTINGS
           =========================================
        */
        const HOST_IP = 'NTFY_ADAPTOR_IP'; // Set NTFY Adaptor IP
        const PORT = '5000';               // Set NTFY Adaptor Port
        const TOPIC = 'topic';             // Set NTFY Topic
        const REFRESH_RATE = 10000;        // Time in milliseconds between refreshes

        const API_BASE = `http://${HOST_IP}:${PORT}`;
        const NOTIF_URL = `${API_BASE}/notifications?topic=${TOPIC}`;
        const CONFIG_URL = `${API_BASE}/config`;

        const wrapper = document.getElementById('notifications-wrapper');
        const scrollContainer = document.getElementById('scroll-container');
        const errorOverlay = document.getElementById('error-overlay');
        const timerEl = document.getElementById('timer');

        let lastId = "";
        let countdown = REFRESH_RATE / 1000;

        let envConfig = {
            emoji_max: "🚨",
            emoji_high: "⚠️",
            emoji_standard: "✔️",
            clock_mode: "24h"
        };

        function updateClock() {
            const now = new Date();
            const options = {
                hour12: envConfig.clock_mode === "12h",
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            document.getElementById('clock').textContent = now.toLocaleTimeString([], options);
            document.getElementById('date').textContent = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);

        async function fetchConfig() {
            try {
                const res = await fetch(CONFIG_URL);
                if (res.ok) {
                    envConfig = await res.json();
                    updateClock();
                }
            } catch (e) { console.warn("Failed to fetch server config, using defaults."); }
        }

        async function loadData() {
            try {
                const response = await fetch(NOTIF_URL, { mode: 'cors' });
                if (!response.ok) throw new Error("API Offline");

                const data = await response.json();
                const dataHash = JSON.stringify(data);

                if (dataHash !== lastId) {
                    render(data);
                    lastId = dataHash;
                }
                errorOverlay.style.display = 'none';
            } catch (err) {
                console.error(err);
                errorOverlay.style.display = 'block';
            }
            countdown = REFRESH_RATE / 1000;
        }

        function render(items) {
            if (!items || items.length === 0) {
                wrapper.innerHTML = '<div style="text-align:center; padding: 5rem; color: var(--text-muted); font-size: 1.5rem;">No recent notifications</div>';
                return;
            }

            wrapper.innerHTML = items.map(item => {
                let priorityClass = "priority-standard";
                if (item.message.includes(envConfig.emoji_max)) priorityClass = "priority-max";
                else if (item.message.includes(envConfig.emoji_high)) priorityClass = "priority-high";

                return `
                    <div class="notification ${priorityClass}">
                        <div class="message-content">
                            <div class="message-text">${item.message}</div>
                            <div class="meta">
                                <div class="time-badge">${item.time}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            scrollContainer.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function autoScroll() {
            if (scrollContainer.scrollHeight > scrollContainer.clientHeight) {
                const maxScroll = scrollContainer.scrollHeight - scrollContainer.clientHeight;
                const current = scrollContainer.scrollTop;

                if (current >= maxScroll - 5) {
                    setTimeout(() => scrollContainer.scrollTo({top: 0, behavior: 'smooth'}), 3000);
                } else {
                    scrollContainer.scrollBy({ top: 1, behavior: 'auto' });
                }
            }
        }
        setInterval(autoScroll, 50);

        setInterval(() => {
            countdown--;
            timerEl.textContent = Math.max(0, countdown);
            if (countdown <= 0) loadData();
        }, 1000);

        (async () => {
            await fetchConfig();
            loadData();
        })();
    </script>
</body>
</html>
